<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation</title>
</head>
<body>
    <style>
        #productlist{
            overflow:auto;
            height:400px;
            width:400px;
            margin:15px;
            padding:10px;
            color:burlywood;
            background-color: blanchedalmond;
            border:10px solid violet;
            box-sizing:border-box;
            align-items:center;
            display:flex;
            flex-direction:row;
            flex-wrap:wrap;
            justify-content: space-between;
        }
        .product{
            height:150px;
            width:150px;
            margin:15px;
            padding:10px;
            color:blueviolet;
            background-color: orange;
            border:10px solid violet;
            box-sizing:border-box;
        }
    </style>

    <div id="productlist">
        <div class="product">
            <button class="cartbtn">Add to Cart 1</button>
        </div>
        <div class="product">
            <button class="cartbtn">Add to Cart 2</button>
        </div>
    </div>
    

    <script src="./EventDelegation.js"></script>

</body>
</html>
