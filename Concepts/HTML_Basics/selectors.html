<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="selector.css">
</head>
<body>
    <h1>Learn Selectors</h1>
    <h2 id="headingOne">This is heading 1</h2>
    <h2 id="headingTwo">This is heading 2</h2>
    <h2 class="myClass">This is heading 3</h2>
    <p class="myClass"><i>This is a simple an normal paragraph!</i></p>
    <form class="myForm" action="/submit-form" method="get">
        <label id="myName" for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your Name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your current Working Email"><br><br>
        <input type="radio" name="subscribe" value="yes" checked>subscribe
        <input type="radio" name="unsubscribe" value="no">unsubscribe
    </form>


</body>
</html>
