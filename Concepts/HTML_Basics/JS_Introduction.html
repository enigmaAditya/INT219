<!--var keyword:-->
<!--The var keyword is used to declare a variable in JavaScript. It has function scope, meaning that a variable declared with var is accessible within the function it is defined in or globally if defined outside any function.-->
<!--let keyword:-->
<!--The let keyword is used to declare a block-scoped variable in JavaScript. A variable declared with let is only accessible within the block (enclosed by curly braces {}) in which it is defined.-->
<!--const keyword:-->
<!--The const keyword is used to declare a block-scoped constant variable in JavaScript. A variable declared with const must be initialized at the time of declaration and cannot be reassigned later.-->
<!--JavaScript pop-up boxes:-->
<!--JavaScript provides three types of pop-up boxes: alert, prompt, and confirm.-->
<!--1. alert(): This function displays a simple pop-up box with a message and an OK button. It is used to inform the user about something.-->
<!--Example:-->
<!--alert("This is an alert box!");-->
<!--2. prompt(): This function displays a pop-up box that prompts the user to enter some input. It has a text field for the user to type in their response and OK and Cancel buttons.-->
<!--Example:-->
<!--var userInput = prompt("Please enter your name:");-->
<!--3. confirm(): This function displays a pop-up box with a message and OK and Cancel buttons. It is used to get a confirmation from the user.-->
