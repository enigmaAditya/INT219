<!-- create  html page with a pasword input field and a paragraph element for displaying the message.  using js  access the input  element  using getelementbyid,     access the paragraph element by usig same, add a focus event listener     to the input field,    when the inputfield receives the focus,  add a css class named focus-stylen to the input fiels, display the message "Typing.." inside the paragraph,   remove any existing css  classes from the paragraph                       element  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="password" id="password" placeholder="Enter your password">
    <p id="message">Hi Aditya</p>

    <script>
        const passwordInput = document.getElementById('password');
        const messageParagraph = document.getElementById('message');

        passwordInput.addEventListener('focus', () => {
            passwordInput.classList.add('focus-style');
            messageParagraph.textContent += ', What are you Typing...';
            messageParagraph.style.display = 'block';// Show the message when the input field receives focus
            messageParagraph.className = '';
            messageParagraph.style.color = 'lightgreen';
        });
        passwordInput.addEventListener('blur', () => {
            passwordInput.classList.remove('focus-style');
            messageParagraph.textContent = 'Hi Aditya';
            messageParagraph.style.display = 'none';// Hide the message when the input field loses focus
            messageParagraph.style.color = 'black';
        });
    </script>

</body>

</html>
